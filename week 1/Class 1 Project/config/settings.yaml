# WHY YAML? JSON is machine-friendly; YAML is human-friendly.
# When students edit configs, they should not worry about trailing commas or braces.

ollama:
  host: "http://localhost:11434"
  default_model: "llama3.2"
  timeout_seconds: 30

sorting:
  input_dir: "data/raw"
  output_dir: "data/sorted"
  # Strategy: 'alphabetical' | 'length' | 'category'
  # WHY: Enum-like configs prevent invalid string typos at runtime.
  strategy: "category"

  # When strategy is 'category', the LLM categorizes each line.
  # This links the two achievements: LLM + text sorting.
  categories:
    - "technology"
    - "sports"
    - "politics"
    - "entertainment"
    - "other"
